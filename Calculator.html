<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <!--<script src="https://cdn.tailwindcss.com"></script>-->
    <link rel="stylesheet" href="Calculator.css">
</head>
<body>

<div class="calculator">
    <div class="mode-area">
        <div class="custom-toggle" id="modeContainer">
            <div id="radBtn" class="mode-btn mode-active" onclick="toggleMode(false)">RAD</div>
            <div id="degBtn" class="mode-btn" onclick="toggleMode(true)">DEG</div>
        </div>
        <button id="themeToggle">🌙</button>
    </div>

    <div class="display-container">
        <div class="input-history" id="history"></div>
        <div class="display" id="display">0<span class="cursor">|</span></div>
    </div>

    <div class="buttons">
        <button class="func" onclick="handleInput('log10(')">log</button>
        <button class="func" onclick="handleInput('ln(')">ln</button>
        <button class="func" onclick="handleInput('sqrt(')">√</button>
        <button class="func" onclick="handleInput('^(')">x<sup>y</sup></button>
        <button class="func" onclick="handleInput('ANS')">ANS</button>

        <button class="func" onclick="handleInput('sin(')">sin</button>
        <button class="func" onclick="handleInput('cos(')">cos</button>
        <button class="func" onclick="handleInput('tan(')">tan</button>
        <button class="func" onclick="handleInput('(')">(</button>
        <button class="func" onclick="handleInput(')')">)</button>

        <button onclick="handleInput('7')">7</button>
        <button onclick="handleInput('8')">8</button>
        <button onclick="handleInput('9')">9</button>
        <button class="func" onclick="handleInput('π')">π</button>
        <button class="func" onclick="handleInput('e')">e</button>
        
        <button onclick="handleInput('4')">4</button>
        <button onclick="handleInput('5')">5</button>
        <button onclick="handleInput('6')">6</button>
        <button class="operator" onclick="handleInput(' * ')">x</button>
        <button class="operator" onclick="handleInput(' / ')">÷</button>

        <button onclick="handleInput('1')">1</button>
        <button onclick="handleInput('2')">2</button>
        <button onclick="handleInput('3')">3</button>
        <button class="operator" onclick="handleInput(' + ')">+</button>
        <button class="operator" onclick="handleInput(' - ')">-</button>

        <button onclick="handleInput('0')">0</button>
        <button onclick="handleInput('.')">.</button>
        <button class="clear" onclick="clearAll()">AC</button>
        <button class="backspace" onclick="backspace()">⌫</button>

        <button id="enter" onclick="calculate()">=</button>
    </div>
</div>

<script src="Calculator.js"></script>
</body>
</html>
